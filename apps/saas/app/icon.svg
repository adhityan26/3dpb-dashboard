<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Slizebiz logo — nozzle + layered aperture emblem
       Palette D1: gray #D1D5DB / #4B5563 / #111827 · accent amber #F59E0B -->
  <defs>
    <clipPath id="notchClip">
      <circle cx="256" cy="296" r="136"/>
    </clipPath>
  </defs>

  <!-- Emblem rings (outer → inner) -->
  <circle cx="256" cy="296" r="168" fill="#D1D5DB"/>
  <circle cx="256" cy="296" r="136" fill="#4B5563"/>
  <circle cx="256" cy="296" r="100" fill="#111827"/>

  <!-- V-notch: mid-gray wedge cutting through the dark ring toward center -->
  <polygon points="256,296 198,152 314,152" fill="#4B5563" clip-path="url(#notchClip)"/>

  <!-- Inner core (amber accent) -->
  <circle cx="256" cy="296" r="64" fill="#F59E0B"/>
  <circle cx="256" cy="296" r="13" fill="#111827"/>

  <!-- Extruder nozzle -->
  <path d="M 206 84
           L 306 84
           L 306 118
           L 284 196
           L 262 236
           L 250 236
           L 228 196
           L 206 118
           Z" fill="#111827"/>
</svg>
